<div class="container mt-4">

  <h2 class="mb-3">Boklista</h2>

  <ul class="list-group">
    <li class="list-group-item" *ngFor="let book of books;">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2">

        <div>
          <strong>{{ book.title }}</strong>
          <span class="text-muted"> av {{ book.author }}</span>
          <span class="text-secondary"> ({{ book.publicationDate | date:'yyyy' }})</span>
        </div>

        <div *ngIf="auth.isLoggedIn()" class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-primary"
                  (click)="editBook(book.id)"
                  aria-label="Edit book {{ book.title }}">
            Redigera
          </button>
          <button class="btn btn-sm btn-outline-danger"
                  (click)="deleteBook(book.id)"
                  aria-label="Ta bort boken {{ book.title }}">
            Ta bort
          </button>
        </div>

      </div>
    </li>
  </ul>

  <div *ngIf="auth.isLoggedIn()" class="mt-3">
    <a [routerLink]="['/add-book']"
       class="btn btn-success"
       role="button"
       aria-label="Lägg till ny bok">
      Lägg till ny bok
    </a>
  </div>
</div>
