<div class="container mt-4">
  <h2 class="mb-3" id="quotesTitle">Mina citat</h2>
  <ul class="list-group" aria-labelledby="quotesTitle">

    <li class="list-group-item" *ngFor="let item of items">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center">

        <span *ngIf="!item.editing" class="mb-2 mb-md-0">{{ item.value }}</span>

        <textarea *ngIf="item.editing"
               class="form-control mb-2 mb-md-0 form-container"
               [(ngModel)]="item.tempValue"
               aria-label="Redigera citat"></textarea>

        <div class="btn-group flex-wrap ms-md-2 button-group" role="group" aria-label="Hantera citat">
          <button *ngIf="!item.editing"
                  class="btn btn-outline-primary btn-sm me-1 mb-1 mb-md-0"
                  (click)="edit(item)">
            Redigera
          </button>

          <button *ngIf="item.editing"
                  class="btn btn-success btn-sm me-1 mb-1 mb-md-0"
                  (click)="save(item.id, item)">
            Spara
          </button>
          <button *ngIf="item.editing"
                  class="btn btn-secondary btn-sm me-1 mb-1 mb-md-0"
                  (click)="abort(item)">
            Avbryt
          </button>

          <button class="btn btn-outline-danger btn-sm mb-1 mb-md-0"
                  (click)="delete(item.id)">
            Ta bort
          </button>
        </div>
      </div>
    </li>
  </ul>
  <div class="d-flex flex-column mt-3 gap-2 align-items-start form-container">
    <textarea
           class="form-control"
           [(ngModel)]="newValue"
           placeholder="Nytt citat"
           aria-label="Nytt citat"></textarea>
    <button class="btn btn-success"
            type="button"
            (click)="add()">
      Lägg till
    </button>
  </div>

  <div *ngIf="errorMessage"
       class="alert alert-danger mt-3"
       role="alert"
       aria-live="polite">
    {{ errorMessage }}
  </div>
</div>
